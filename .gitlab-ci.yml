stages:
  - test
  - build
  - deploy

variables:
  DOCKER_IMAGE_BACKEND: $CI_REGISTRY_IMAGE/backend:$CI_COMMIT_SHORT_SHA
  DOCKER_IMAGE_BACKEND_LATEST: $CI_REGISTRY_IMAGE/backend:latest
  DOCKER_IMAGE_FRONTEND: $CI_REGISTRY_IMAGE/frontend:$CI_COMMIT_SHORT_SHA
  DOCKER_IMAGE_FRONTEND_LATEST: $CI_REGISTRY_IMAGE/frontend:latest

test-api-connection:
  stage: test
  image: alpine:latest
  before_script:
    - apk add --no-cache curl bash
  script:
    - echo "Checking API availability..."
    - curl -s -o /dev/null -w "%{http_code}" $API_BASE_URL/health | grep -q "200" && echo "API available" || echo "API unavailable"
  only:
    - main
    - develop
  variables:
    API_BASE_URL: "http://82.23.177.102:5000"

build-backend:
  stage: build
  image: docker:24.0.5
  services:
    - docker:24.0.5-dind
  before_script:
    - echo "$CI_REGISTRY_PASSWORD" | docker login -u "$CI_REGISTRY_USER" --password-stdin "$CI_REGISTRY"
  script:
    - echo "Building backend..."
    - docker build -t $DOCKER_IMAGE_BACKEND -t $DOCKER_IMAGE_BACKEND_LATEST -f backend/Dockerfile.backend .
    - docker push $DOCKER_IMAGE_BACKEND
    - docker push $DOCKER_IMAGE_BACKEND_LATEST
    - echo "Backend built and pushed"
  only:
    - main
  when: manual

build-frontend:
  stage: build
  image: docker:24.0.5
  services:
    - docker:24.0.5-dind
  before_script:
    - echo "$CI_REGISTRY_PASSWORD" | docker login -u "$CI_REGISTRY_USER" --password-stdin "$CI_REGISTRY"
  script:
    - echo "Building frontend..."
    - docker build -t $DOCKER_IMAGE_FRONTEND -t $DOCKER_IMAGE_FRONTEND_LATEST -f frontend/Dockerfile.frontend .
    - docker push $DOCKER_IMAGE_FRONTEND
    - docker push $DOCKER_IMAGE_FRONTEND_LATEST
    - echo "Frontend built and pushed"
  only:
    - main
  when: manual

deploy:
  stage: deploy
  image: alpine:latest
  before_script:
    - apk add --no-cache openssh-client bash
    - eval $(ssh-agent -s)
    - echo "$SSH_PRIVATE_KEY" | tr -d '\r' | ssh-add -
    - mkdir -p ~/.ssh
    - chmod 700 ~/.ssh
  script:
    - echo "Deploying full stack..."
    - ssh -o StrictHostKeyChecking=no ${DEPLOY_USER}@${DEPLOY_HOST} "cd ${DEPLOY_PATH} && docker-compose pull && docker-compose up -d"
    - echo "Deploy completed"
  only:
    - main
  when: manual
  environment:
    name: production
    url: http://$DEPLOY_HOST

deploy-dev:
  stage: deploy
  image: alpine:latest
  before_script:
    - apk add --no-cache openssh-client bash
    - eval $(ssh-agent -s)
    - echo "$SSH_PRIVATE_KEY" | tr -d '\r' | ssh-add -
    - mkdir -p ~/.ssh
    - chmod 700 ~/.ssh
  script:
    - ssh -o StrictHostKeyChecking=no ${DEPLOY_USER}@${DEPLOY_DEV_HOST} "cd ${DEPLOY_DEV_PATH} && docker-compose pull && docker-compose up -d"
  only:
    - develop
  environment:
    name: development
    url: http://$DEPLOY_DEV_HOST

rollback:
  stage: deploy
  image: alpine:latest
  before_script:
    - apk add --no-cache openssh-client bash
    - eval $(ssh-agent -s)
    - echo "$SSH_PRIVATE_KEY" | tr -d '\r' | ssh-add -
    - mkdir -p ~/.ssh
    - chmod 700 ~/.ssh
  script:
    - ssh -o StrictHostKeyChecking=no ${DEPLOY_USER}@${DEPLOY_HOST} "cd ${DEPLOY_PATH} && docker-compose pull && docker-compose up -d"
  only:
    - main
  when: manual
  environment:
    name: production
    action: stop