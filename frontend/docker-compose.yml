version: '3.8'

services:
  # Веб-сайт (фронтенд)
  website:
    build:
      context: .
      dockerfile: Dockerfile.website
    container_name: eduface-website
    restart: always
    environment:
      API_BASE_URL: ${API_BASE_URL:-http://82.23.177.102:5000}
      FLASK_HOST: 0.0.0.0
      FLASK_PORT: 5001
      FLASK_DEBUG: ${FLASK_DEBUG:-False}
      SECRET_KEY: ${SECRET_KEY:-dev-secret-key-change-in-production}
      CACHE_ENABLED: ${CACHE_ENABLED:-False}
      CACHE_TTL: ${CACHE_TTL:-300}
    ports:
      - "5001:5001"
    volumes:
      - ./logs:/app/logs
      - ./static:/app/static
    networks:
      - eduface-network

  # Nginx (для статики и прокси)
  nginx:
    image: nginx:alpine
    container_name: eduface-nginx-website
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./static:/usr/share/nginx/html/static:ro
    depends_on:
      - website
    networks:
      - eduface-network
    profiles:
      - with-nginx

networks:
  eduface-network:
    driver: bridge