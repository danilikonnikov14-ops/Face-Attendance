version: '1.0.0'

services:
  #POSTGRESQL
  postgres:
    image: postgres:15-alpine
    container_name: face-attendance-postgres
    restart: always
    environment:
      POSTGRES_DB: ${DB_NAME:-postgres}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-brjyybrjdlfybk}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - face-attendance-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  #БЭКЕНД
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile.backend
    image: ${CI_REGISTRY_IMAGE:-face-attendance}/backend:${CI_COMMIT_SHORT_SHA:-latest}
    container_name: face-attendance-backend
    restart: always
    environment:
      DB_HOST: postgres
      DB_NAME: ${DB_NAME:-postgres}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-brjyybrjdlfybk}
      DB_PORT: 5432
      GROUPS: ${GROUPS:-09.07.14п1,09.07.14п2,09.07.14р}
      FLASK_HOST: 0.0.0.0
      FLASK_PORT: 5000
      FLASK_DEBUG: ${FLASK_DEBUG:-False}
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      SCHEDULE_UPDATE_INTERVAL: ${SCHEDULE_UPDATE_INTERVAL:-3600}
      MODEL_PATH: /app/models/face_recognition_model.pth
    volumes:
      - ./backend/models:/app/models
      - ./backend/logs:/app/logs
    networks:
      - face-attendance-network
    depends_on:
      postgres:
        condition: service_healthy
    command: python server.py

  #ФРОНТЕНД
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile.frontend
    image: ${CI_REGISTRY_IMAGE:-face-attendance}/frontend:${CI_COMMIT_SHORT_SHA:-latest}
    container_name: face-attendance-frontend
    restart: always
    environment:
      API_BASE_URL: http://backend:5000
      FLASK_HOST: 0.0.0.0
      FLASK_PORT: 5001
      FLASK_DEBUG: ${FLASK_DEBUG:-False}
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
    networks:
      - face-attendance-network
    depends_on:
      - backend
    command: python app.py

  #NGINX
  nginx:
    image: nginx:alpine
    container_name: face-attendance-nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./frontend/static:/usr/share/nginx/html/static:ro
    networks:
      - face-attendance-network
    depends_on:
      - backend
      - frontend

networks:
  face-attendance-network:
    driver: bridge

volumes:
  postgres_data: